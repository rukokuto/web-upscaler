<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Upscaler HD</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        h1 { font-size: 24px; margin-bottom: 10px; }
        .upload-area { border: 2px dashed #475569; padding: 40px; border-radius: 15px; margin: 20px 0; cursor: pointer; color: #94a3b8; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        button:hover { background: #2563eb; }
        .ad-space { background: #334155; padding: 10px; border-radius: 8px; margin: 15px 0; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ AI Photo Upscaler</h1>
    <p>Ubah foto blur jadi tajam dalam hitungan detik.</p>

    <div class="ad-space">Space Iklan</div>

    <div class="upload-area">Pilih Foto dari Galeri</div>
    <button onclick="alert('Hubungkan API AI!')">Upscale Sekarang</button>

    <div class="ad-space">Space Iklan</div>
</div>

</body>
</html>
