<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Upscaler HD</title>
    <!-- Tailwind CSS untuk desain modern -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 text-center">
        <h1 class="text-3xl font-bold mb-2 text-blue-400">✨ AI Upscaler</h1>
        <p class="text-slate-400 mb-6">Tingkatkan kualitas foto blur Anda ke level HD.</p>

        <!-- Tempat Iklan -->
        <div class="bg-slate-900 p-4 rounded-lg mb-6 border border-dashed border-slate-600 text-slate-500 text-sm">
            Space Iklan Anda
        </div>

        <!-- Area Upload -->
        <div class="border-2 border-dashed border-slate-600 p-10 rounded-xl mb-6 hover:border-blue-500 transition-colors cursor-pointer">
            <span class="text-slate-300">Klik atau seret foto di sini</span>
        </div>

        <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-900/50">
            Upscale Sekarang
        </button>

        <!-- Tempat Iklan Bawah -->
        <div class="bg-slate-900 p-4 rounded-lg mt-6 border border-dashed border-slate-600 text-slate-500 text-sm">
            Space Iklan Anda
        </div>
    </div>

</body>
</html>
