<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Upscaler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dots { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 20px 20px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4 dots">

    <div class="glass w-full max-w-sm p-8 rounded-3xl shadow-2xl text-center">
        <!-- Judul -->
        <h1 class="text-3xl font-extrabold mb-2 text-white">AI Upscaler</h1>
        <div class="h-1 w-12 bg-blue-500 mx-auto rounded-full mb-6"></div>
        <p class="text-slate-400 mb-8 text-sm leading-relaxed">Tingkatkan kualitas foto Anda ke resolusi HD dengan teknologi AI yang presisi.</p>

        <!-- Area Upload -->
        <div class="mb-6">
            <button class="w-full py-12 border-2 border-dashed border-slate-700 rounded-2xl hover:border-blue-500 transition-all duration-300 group">
                <div class="text-3xl mb-2 opacity-70 group-hover:scale-110 transition-transform">📁</div>
                <span class="text-sm text-slate-400 group-hover:text-blue-400">Pilih foto dari galeri</span>
            </button>
        </div>

        <!-- Tombol -->
        <button class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-500 transition-all shadow-[0_4px_20px_-5px_rgba(37,99,235,0.5)]">
            Proses Sekarang
        </button>
    </div>

</body>
</html>
