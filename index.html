<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Upscaler Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tambahan Font Agar Lebih Keren -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .logo-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-sm p-8 rounded-[2rem] shadow-2xl text-center">
        <!-- Logo -->
        <div class="logo-glow w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-6 flex items-center justify-center text-4xl transform -rotate-6">
            ✨
        </div>
        
        <h1 class="text-3xl font-black mb-2 tracking-tight">AI Upscaler</h1>
        <p class="text-slate-400 mb-8 text-sm">Pintar, Cepat, dan High Definition</p>

        <!-- Area Upload -->
        <div class="group relative mb-6">
            <button class="w-full py-16 border-2 border-dashed border-slate-700 rounded-3xl hover:border-blue-500 hover:bg-blue-500/10 transition-all duration-300">
                <div class="text-5xl mb-3">🖼️</div>
                <div class="font-bold">Pilih Foto</div>
                <div class="text-xs text-slate-500 mt-1">PNG, JPG (Max 5MB)</div>
            </button>
        </div>

        <!-- Tombol Utama -->
        <button class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-blue-500 hover:text-white transition-all duration-300 shadow-xl shadow-blue-500/20">
            Upscale Sekarang
        </button>
    </div>

</body>
</html>
