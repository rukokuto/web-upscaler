<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Upscaler HD</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .ad-space { background: #eee; padding: 10px; margin: 15px 0; border: 1px dashed #999; }
        button { padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Photo Upscaler</h1>
    <p>Ubah foto Anda jadi HD dengan satu klik!</p>

    <div class="ad-space">Pasang Kode Iklan Anda di Sini</div>

    <input type="file" id="upload" accept="image/*">
    <br><br>
    <button onclick="alert('Hubungkan ke API AI nanti!')">Proses ke HD</button>

    <div id="result" style="margin-top:20px;"></div>

    <div class="ad-space">Pasang Kode Iklan Anda di Sini</div>
</div>

</body>
</html>
