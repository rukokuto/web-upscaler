<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Upscaler Cyber</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        /* Gradasi Neon Background */
        .bg-cyber { background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%); }
        /* Efek Neon Glow */
        .neon-text { text-shadow: 0 0 10px #ec4899, 0 0 20px #ec4899; }
        .neon-border { box-shadow: 0 0 15px rgba(236, 72, 153, 0.5); }
        /* Glassmorphism Panel */
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-cyber text-white min-h-screen flex items-center justify-center p-4">

    <div class="glass-panel w-full max-w-md p-10 rounded-3xl border border-pink-500/20 neon-border">
        <!-- Header dengan Teks Neon -->
        <h1 class="text-5xl font-extrabold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-500 to-blue-500 neon-text">
            AI Upscaler
        </h1>
        <p class="text-slate-300 mb-10 font-medium tracking-wide">Ubah Resolusi Rendah ke Kualitas Tinggi</p>

        <!-- Area Upload -->
        <div class="relative group mb-8">
            <!-- Garis Neon saat di-hover -->
            <div class="absolute -inset-0.5 bg-gradient-to-r from-pink-600 to-purple-600 rounded-2xl blur opacity-30 group-hover:opacity-100 transition duration-500"></div>
            
            <button class="relative w-full py-16 bg-black rounded-2xl border-2 border-slate-800 hover:border-pink-500 transition-colors duration-300 flex flex-col items-center justify-center">
                <svg class="w-12 h-12 text-pink-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
                <span class="text-slate-300 font-semibold group-hover:text-white">Pilih Gambar</span>
                <span class="text-xs text-slate-600 mt-1">Maks. 10MB</span>
            </button>
        </div>

        <!-- Tombol Utama Gradasi -->
        <button class="w-full py-5 rounded-2xl font-bold text-black text-lg bg-gradient-to-r from-pink-500 via-purple-500 to-purple-600 hover:from-pink-400 hover:via-purple-400 hover:to-purple-500 transition-all shadow-lg shadow-purple-900/50 transform hover:scale-[1.01]">
            Mulai Pemrosesan
        </button>

    </div>

</body>
</html>
